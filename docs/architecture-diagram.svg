<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#8a8a8a"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000010"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="960" height="720" fill="#f8f6f3"/>

  <!-- 标题 -->
  <text x="480" y="38" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="700">OptiONE 系统架构</text>
  <text x="480" y="58" text-anchor="middle" fill="#6a6a6a" font-size="13" font-weight="400">AI 原生任务管理 · 人机协作团队</text>

  <!-- 层标签 -->
  <text x="24" y="118" fill="#8a8a8a" font-size="11" font-weight="600" transform="rotate(-90,24,118)">客户端</text>
  <text x="24" y="278" fill="#8a8a8a" font-size="11" font-weight="600" transform="rotate(-90,24,278)">共享包</text>
  <text x="24" y="438" fill="#8a8a8a" font-size="11" font-weight="600" transform="rotate(-90,24,438)">服务端</text>
  <text x="24" y="618" fill="#8a8a8a" font-size="11" font-weight="600" transform="rotate(-90,24,618)">数据与智能体</text>

  <!-- 分隔线 -->
  <line x1="50" y1="170" x2="920" y2="170" stroke="#e0ddd8" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="50" y1="330" x2="920" y2="330" stroke="#e0ddd8" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="50" y1="530" x2="920" y2="530" stroke="#e0ddd8" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ===== 客户端层 ===== -->
  <!-- Web 应用 -->
  <rect x="160" y="82" width="200" height="72" rx="12" ry="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="112" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">Web 应用</text>
  <text x="260" y="132" text-anchor="middle" fill="#3a3a3a" font-size="12">Next.js 16 · App Router</text>
  <text x="260" y="146" text-anchor="middle" fill="#5a5a5a" font-size="11">Tailwind · Zustand · TanStack</text>

  <!-- 桌面应用 -->
  <rect x="420" y="82" width="200" height="72" rx="12" ry="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="520" y="112" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">桌面应用</text>
  <text x="520" y="132" text-anchor="middle" fill="#3a3a3a" font-size="12">Electron · React</text>
  <text x="520" y="146" text-anchor="middle" fill="#5a5a5a" font-size="11">electron-vite</text>

  <!-- 文档站 -->
  <rect x="680" y="82" width="200" height="72" rx="12" ry="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="780" y="112" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">文档站</text>
  <text x="780" y="132" text-anchor="middle" fill="#3a3a3a" font-size="12">Fumadocs · MDX</text>

  <!-- ===== 共享包层 ===== -->
  <!-- 包分组容器 -->
  <rect x="100" y="192" width="760" height="120" rx="10" ry="10" fill="none" stroke="#b0ada8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="116" y="210" fill="#8a8a8a" font-size="11" font-weight="600">共享包（pnpm monorepo）</text>

  <!-- @multica/core -->
  <rect x="120" y="222" width="230" height="72" rx="10" ry="10" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="235" y="250" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">@multica/core</text>
  <text x="235" y="268" text-anchor="middle" fill="#3a3a3a" font-size="11">API 客户端 · 类型 · 状态管理</text>
  <text x="235" y="282" text-anchor="middle" fill="#5a5a5a" font-size="11">查询 · 变更 · 实时同步</text>

  <!-- @multica/views -->
  <rect x="370" y="222" width="230" height="72" rx="10" ry="10" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="485" y="250" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">@multica/views</text>
  <text x="485" y="268" text-anchor="middle" fill="#3a3a3a" font-size="11">任务 · 智能体 · 收件箱 · 聊天</text>
  <text x="485" y="282" text-anchor="middle" fill="#5a5a5a" font-size="11">编辑器 · 弹窗 · 导航</text>

  <!-- @multica/ui -->
  <rect x="620" y="222" width="220" height="72" rx="10" ry="10" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="730" y="250" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">@multica/ui</text>
  <text x="730" y="268" text-anchor="middle" fill="#3a3a3a" font-size="11">shadcn · Radix · TipTap</text>
  <text x="730" y="282" text-anchor="middle" fill="#5a5a5a" font-size="11">设计令牌 · 基础组件</text>

  <!-- ===== 服务端层 ===== -->
  <!-- Go 后端主框 -->
  <rect x="140" y="352" width="680" height="160" rx="12" ry="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="480" y="378" text-anchor="middle" fill="#1a1a1a" font-size="17" font-weight="700">Go 后端</text>
  <text x="480" y="396" text-anchor="middle" fill="#3a3a3a" font-size="12">Chi 路由 · JWT 认证 · S3 存储</text>

  <!-- 内部模块 -->
  <rect x="162" y="410" width="130" height="46" rx="8" ry="8" fill="#c8ede6" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="227" y="430" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">路由处理</text>
  <text x="227" y="446" text-anchor="middle" fill="#5a5a5a" font-size="10">44 个路由文件</text>

  <rect x="306" y="410" width="130" height="46" rx="8" ry="8" fill="#c8ede6" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="371" y="430" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">业务服务</text>
  <text x="371" y="446" text-anchor="middle" fill="#5a5a5a" font-size="10">任务 · 邮件</text>

  <rect x="450" y="410" width="130" height="46" rx="8" ry="8" fill="#c8ede6" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="515" y="430" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">实时通信</text>
  <text x="515" y="446" text-anchor="middle" fill="#5a5a5a" font-size="10">WS Hub · 事件</text>

  <rect x="594" y="410" width="130" height="46" rx="8" ry="8" fill="#c8ede6" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="659" y="430" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">sqlc 查询</text>
  <text x="659" y="446" text-anchor="middle" fill="#5a5a5a" font-size="10">类型安全 SQL</text>

  <!-- 内部模块第二行 -->
  <rect x="162" y="464" width="130" height="46" rx="8" ry="8" fill="#c8ede6" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="227" y="484" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">智能体 SDK</text>
  <text x="227" y="500" text-anchor="middle" fill="#5a5a5a" font-size="10">Claude · Codex · Hermes</text>

  <rect x="306" y="464" width="130" height="46" rx="8" ry="8" fill="#c8ede6" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="371" y="484" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">守护进程 API</text>
  <text x="371" y="500" text-anchor="middle" fill="#5a5a5a" font-size="10">注册 · 心跳</text>

  <rect x="450" y="464" width="130" height="46" rx="8" ry="8" fill="#c8ede6" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="515" y="484" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">中间件</text>
  <text x="515" y="500" text-anchor="middle" fill="#5a5a5a" font-size="10">认证 · 工作区</text>

  <rect x="594" y="464" width="130" height="46" rx="8" ry="8" fill="#c8ede6" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="659" y="484" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="600">事件总线</text>
  <text x="659" y="500" text-anchor="middle" fill="#5a5a5a" font-size="10">内存发布/订阅</text>

  <!-- ===== 数据与智能体层 ===== -->
  <!-- PostgreSQL -->
  <rect x="160" y="558" width="240" height="80" rx="12" ry="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="280" y="590" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">PostgreSQL 17</text>
  <text x="280" y="608" text-anchor="middle" fill="#3a3a3a" font-size="12">pgvector · sqlc 迁移</text>
  <text x="280" y="624" text-anchor="middle" fill="#5a5a5a" font-size="11">30+ 领域数据表</text>

  <!-- 智能体守护进程 -->
  <rect x="480" y="558" width="240" height="80" rx="12" ry="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="586" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">智能体守护进程</text>
  <text x="600" y="604" text-anchor="middle" fill="#3a3a3a" font-size="12">CLI · 本地运行时</text>
  <text x="600" y="620" text-anchor="middle" fill="#5a5a5a" font-size="11">Claude · Codex · OpenClaw · OpenCode</text>

  <!-- CLI -->
  <rect x="780" y="558" width="140" height="80" rx="12" ry="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="850" y="590" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="600">multica CLI</text>
  <text x="850" y="608" text-anchor="middle" fill="#3a3a3a" font-size="12">Cobra · goreleaser</text>
  <text x="850" y="624" text-anchor="middle" fill="#5a5a5a" font-size="11">Homebrew</text>

  <!-- ===== 箭头 ===== -->
  <!-- Web 应用 → 共享包 (core) -->
  <path d="M 260,154 L 260,168 L 235,168 L 235,222" stroke="#5a5a5a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <!-- 桌面应用 → 共享包 (views) -->
  <path d="M 520,154 L 520,168 L 485,168 L 485,222" stroke="#5a5a5a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Core → 后端 (HTTP + WS) -->
  <path d="M 235,294 L 235,328 L 340,328 L 340,352" stroke="#5a5a5a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="248" y="316" width="72" height="16" rx="4" fill="#f8f6f3"/>
  <text x="284" y="328" text-anchor="middle" fill="#5a5a5a" font-size="11">REST API</text>

  <!-- 实时 WS 箭头 -->
  <path d="M 235,294 L 235,328 L 515,328 L 515,352" stroke="#5a5a5a" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow-dashed)"/>
  <rect x="385" y="316" width="80" height="16" rx="4" fill="#f8f6f3"/>
  <text x="425" y="328" text-anchor="middle" fill="#8a8a8a" font-size="11">WebSocket</text>

  <!-- 后端 → PostgreSQL -->
  <path d="M 350,512 L 350,528 L 280,528 L 280,558" stroke="#5a5a5a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="274" y="533" width="60" height="16" rx="4" fill="#f8f6f3"/>
  <text x="304" y="544" text-anchor="middle" fill="#5a5a5a" font-size="11">sqlc</text>

  <!-- 后端 → 智能体守护进程 -->
  <path d="M 580,512 L 580,528 L 600,528 L 600,558" stroke="#5a5a5a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="546" y="533" width="92" height="16" rx="4" fill="#f8f6f3"/>
  <text x="592" y="544" text-anchor="middle" fill="#5a5a5a" font-size="11">守护进程 API</text>

  <!-- CLI → 后端 -->
  <path d="M 850,558 L 850,432 L 824,432" stroke="#8a8a8a" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow-dashed)"/>

  <!-- ===== 图例 ===== -->
  <rect x="730" y="658" width="210" height="50" rx="8" ry="8" fill="#ffffff" stroke="#b0ada8" stroke-width="1"/>
  <text x="745" y="674" fill="#1a1a1a" font-size="11" font-weight="600">图例</text>
  <line x1="745" y1="686" x2="775" y2="686" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="782" y="690" fill="#6a6a6a" font-size="10">同步（REST / SQL）</text>
  <line x1="745" y1="700" x2="775" y2="700" stroke="#8a8a8a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dashed)"/>
  <text x="782" y="704" fill="#6a6a6a" font-size="10">异步（WebSocket / 事件）</text>

  <!-- 颜色图例 -->
  <rect x="60" y="660" width="16" height="16" rx="4" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="1"/>
  <text x="82" y="673" fill="#6a6a6a" font-size="10">客户端应用</text>
  <rect x="168" y="660" width="16" height="16" rx="4" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1"/>
  <text x="190" y="673" fill="#6a6a6a" font-size="10">共享包</text>
  <rect x="248" y="660" width="16" height="16" rx="4" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1"/>
  <text x="270" y="673" fill="#6a6a6a" font-size="10">Go 后端</text>
  <rect x="328" y="660" width="16" height="16" rx="4" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1"/>
  <text x="350" y="673" fill="#6a6a6a" font-size="10">存储</text>
</svg>