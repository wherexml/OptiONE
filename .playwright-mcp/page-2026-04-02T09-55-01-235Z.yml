                          - text: (covers self-hosted)
                        - listitem [ref=e1201]:
                          - text: Neither →
                          - strong [ref=e1202]: unknown
                          - text: (use git-native commands only)
                  - paragraph [ref=e1203]: Determine which branch this PR/MR targets, or the repo's default branch if no PR/MR exists. Use the result as "the base branch" in all subsequent steps.
                  - paragraph [ref=e1204]:
                    - strong [ref=e1205]: "If GitHub:"
                  - list [ref=e1206]:
                    - listitem [ref=e1207]:
                      - code [ref=e1208]: gh pr view --json baseRefName -q .baseRefName
                      - text: — if succeeds, use it
                    - listitem [ref=e1209]:
                      - code [ref=e1210]: gh repo view --json defaultBranchRef -q .defaultBranchRef.name
                      - text: — if succeeds, use it
                  - paragraph [ref=e1211]:
                    - strong [ref=e1212]: "If GitLab:"
                  - list [ref=e1213]:
                    - listitem [ref=e1214]:
                      - code [ref=e1215]: glab mr view -F json 2>/dev/null
                      - text: and extract the
                      - code [ref=e1216]: target_branch
                      - text: field — if succeeds, use it
                    - listitem [ref=e1217]:
                      - code [ref=e1218]: glab repo view -F json 2>/dev/null
                      - text: and extract the
                      - code [ref=e1219]: default_branch
                      - text: field — if succeeds, use it
                  - paragraph [ref=e1220]:
                    - strong [ref=e1221]: "Git-native fallback (if unknown platform, or CLI commands fail):"
                  - list [ref=e1222]:
                    - listitem [ref=e1223]:
                      - code [ref=e1224]: git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed 's|refs/remotes/origin/||'
                    - listitem [ref=e1225]:
                      - text: "If that fails:"
                      - code [ref=e1226]: git rev-parse --verify origin/main 2>/dev/null
                      - text: → use
                      - code [ref=e1227]: main
                    - listitem [ref=e1228]:
                      - text: "If that fails:"
                      - code [ref=e1229]: git rev-parse --verify origin/master 2>/dev/null
                      - text: → use
                      - code [ref=e1230]: master
                  - paragraph [ref=e1231]:
                    - text: If all fail, fall back to
                    - code [ref=e1232]: main
                    - text: .
                  - paragraph [ref=e1233]:
                    - text: Print the detected base branch name. In every subsequent
                    - code [ref=e1234]: git diff
                    - text: ","
                    - code [ref=e1235]: git log
                    - text: ","
                    - code [ref=e1236]: git fetch
                    - text: ","
                    - code [ref=e1237]: git merge
                    - text: ", and PR/MR creation command, substitute the detected branch name wherever the instructions say \"the base branch\" or"
                    - code [ref=e1238]: <default>
                    - text: .
                  - separator [ref=e1239]
                  - heading "Prerequisite Skill Offer" [level=2] [ref=e1240]
                  - paragraph [ref=e1241]: When the design doc check above prints "No design doc found," offer the prerequisite skill before proceeding.
                  - paragraph [ref=e1242]: "Say to the user via AskUserQuestion:"
                  - blockquote [ref=e1243]:
                    - paragraph [ref=e1244]:
                      - text: "\"No design doc found for this branch."
                      - code [ref=e1245]: /office-hours
                      - text: produces a structured problem statement, premise challenge, and explored alternatives — it gives this review much sharper input to work with. Takes about 10 minutes. The design doc is per-feature, not per-product — it captures the thinking behind this specific change."
                  - paragraph [ref=e1246]: "Options:"
                  - list [ref=e1247]:
                    - listitem [ref=e1248]: A) Run /office-hours now (we'll pick up the review right after)
                    - listitem [ref=e1249]: B) Skip — proceed with standard review
                  - paragraph [ref=e1250]: "If they skip: \"No worries — standard review. If you ever want sharper input, try /office-hours first next time.\" Then proceed normally. Do not re-offer later in the session."
                  - paragraph [ref=e1251]: "If they choose A:"
                  - paragraph [ref=e1252]: "Say: \"Running /office-hours inline. Once the design doc is ready, I'll pick up the review right where we left off.\""
                  - paragraph [ref=e1253]:
                    - text: Read the
                    - code [ref=e1254]: /office-hours
                    - text: skill file at
                    - code [ref=e1255]: ~/.claude/skills/gstack/office-hours/SKILL.md
                    - text: using the Read tool.
                  - paragraph [ref=e1256]:
                    - strong [ref=e1257]: "If unreadable:"
                    - text: Skip with "Could not load /office-hours — skipping." and continue.
