                  - heading "AskUserQuestion Format" [level=2] [ref=e929]
                  - paragraph [ref=e930]:
                    - strong [ref=e931]: "ALWAYS follow this structure for every AskUserQuestion call:"
                  - list [ref=e932]:
                    - listitem [ref=e933]:
                      - strong [ref=e934]: "Re-ground:"
                      - text: State the project, the current branch (use the
                      - code [ref=e935]: _BRANCH
                      - text: value printed by the preamble — NOT any branch from conversation history or gitStatus), and the current plan/task. (1-2 sentences)
                    - listitem [ref=e936]:
                      - strong [ref=e937]: "Simplify:"
                      - text: Explain the problem in plain English a smart 16-year-old could follow. No raw function names, no internal jargon, no implementation details. Use concrete examples and analogies. Say what it DOES, not what it's called.
                    - listitem [ref=e938]:
                      - strong [ref=e939]: "Recommend:"
                      - code [ref=e940]: "RECOMMENDATION: Choose [X] because [one-line reason]"
                      - text: — always prefer the complete option over shortcuts (see Completeness Principle). Include
                      - code [ref=e941]: "Completeness: X/10"
                      - text: "for each option. Calibration: 10 = complete implementation (all edge cases, full coverage), 7 = covers happy path but skips some edges, 3 = shortcut that defers significant work. If both options are 8+, pick the higher; if one is ≤5, flag it."
                    - listitem [ref=e942]:
                      - strong [ref=e943]: "Options:"
                      - text: "Lettered options:"
                      - code [ref=e944]: A) ... B) ... C) ...
                      - text: "— when an option involves effort, show both scales:"
                      - code [ref=e945]: "(human: ~X / CC: ~Y)"
                  - paragraph [ref=e946]: Assume the user hasn't looked at this window in 20 minutes and doesn't have the code open. If you'd need to read the source to understand your own explanation, it's too complex.
                  - paragraph [ref=e947]: Per-skill instructions may add additional formatting rules on top of this baseline.
                  - heading "Completeness Principle — Boil the Lake" [level=2] [ref=e948]
                  - paragraph [ref=e949]: AI makes completeness near-free. Always recommend the complete option over shortcuts — the delta is minutes with CC+gstack. A "lake" (100% coverage, all edge cases) is boilable; an "ocean" (full rewrite, multi-quarter migration) is not. Boil lakes, flag oceans.
                  - paragraph [ref=e950]:
