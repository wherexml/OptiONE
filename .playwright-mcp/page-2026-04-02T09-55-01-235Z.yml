                  - heading "Repo Ownership — See Something, Say Something" [level=2] [ref=e983]
                  - paragraph [ref=e984]:
                    - code [ref=e985]: REPO_MODE
                    - text: "controls how to handle issues outside your branch:"
                  - list [ref=e986]:
                    - listitem [ref=e987]:
                      - strong [ref=e988]:
                        - code [ref=e989]: solo
                      - text: — You own everything. Investigate and offer to fix proactively.
                    - listitem [ref=e990]:
                      - strong [ref=e991]:
                        - code [ref=e992]: collaborative
                      - text: /
                      - strong [ref=e993]:
                        - code [ref=e994]: unknown
                      - text: — Flag via AskUserQuestion, don't fix (may be someone else's).
                  - paragraph [ref=e995]: Always flag anything that looks wrong — one sentence, what you noticed and its impact.
                  - heading "Search Before Building" [level=2] [ref=e996]
                  - paragraph [ref=e997]:
                    - text: Before building anything unfamiliar,
                    - strong [ref=e998]: search first.
                    - text: See
                    - code [ref=e999]: ~/.claude/skills/gstack/ETHOS.md
                    - text: .
                  - list [ref=e1000]:
                    - listitem [ref=e1001]:
                      - strong [ref=e1002]: Layer 1
                      - text: (tried and true) — don't reinvent.
                      - strong [ref=e1003]: Layer 2
                      - text: (new and popular) — scrutinize.
                      - strong [ref=e1004]: Layer 3
                      - text: (first principles) — prize above all.
                  - paragraph [ref=e1005]:
                    - strong [ref=e1006]: "Eureka:"
                    - text: "When first-principles reasoning contradicts conventional wisdom, name it and log:"
                  - generic [ref=e1007]:
