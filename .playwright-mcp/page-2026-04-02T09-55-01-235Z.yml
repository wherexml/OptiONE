                      - generic [ref=e1009]: bash
                      - button "Copy code" [ref=e1010]:
                        - img
                    - code [ref=e1014]:
                      - generic [ref=e1015]: "jq -n --arg ts \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\" --arg skill \"SKILL_NAME\" --arg branch \"$(git branch --show-current 2>/dev/null)\" --arg insight \"ONE_LINE_SUMMARY\" '{ts:$ts,skill:$skill,branch:$branch,insight:$insight}' >> ~/.gstack/analytics/eureka.jsonl 2>/dev/null || true"
                  - heading "Completion Status Protocol" [level=2] [ref=e1016]
                  - paragraph [ref=e1017]: "When completing a skill workflow, report status using one of:"
                  - list [ref=e1018]:
                    - listitem [ref=e1019]:
                      - strong [ref=e1020]: DONE
                      - text: — All steps completed successfully. Evidence provided for each claim.
                    - listitem [ref=e1021]:
                      - strong [ref=e1022]: DONE_WITH_CONCERNS
                      - text: — Completed, but with issues the user should know about. List each concern.
                    - listitem [ref=e1023]:
                      - strong [ref=e1024]: BLOCKED
                      - text: — Cannot proceed. State what is blocking and what was tried.
                    - listitem [ref=e1025]:
                      - strong [ref=e1026]: NEEDS_CONTEXT
                      - text: — Missing information required to continue. State exactly what you need.
                  - heading "Escalation" [level=3] [ref=e1027]
                  - paragraph [ref=e1028]: It is always OK to stop and say "this is too hard for me" or "I'm not confident in this result."
                  - paragraph [ref=e1029]: Bad work is worse than no work. You will not be penalized for escalating.
                  - list [ref=e1030]:
                    - listitem [ref=e1031]: If you have attempted a task 3 times without success, STOP and escalate.
                    - listitem [ref=e1032]: If you are uncertain about a security-sensitive change, STOP and escalate.
                    - listitem [ref=e1033]: If the scope of work exceeds what you can verify, STOP and escalate.
                  - paragraph [ref=e1034]: "Escalation format:"
                  - generic [ref=e1035]:
                    - generic [ref=e1036]:
                      - generic [ref=e1037]: plain text
                      - button "Copy code" [ref=e1038]:
                        - img
                    - code [ref=e1042]:
                      - generic [ref=e1043]: "STATUS: BLOCKED | NEEDS_CONTEXT"
                      - generic [ref=e1044]: "REASON: [1-2 sentences]"
                      - generic [ref=e1045]: "ATTEMPTED: [what you tried]"
                      - generic [ref=e1046]: "RECOMMENDATION: [what the user should do next]"
                  - heading "Operational Self-Improvement" [level=2] [ref=e1047]
                  - paragraph [ref=e1048]: "Before completing, reflect on this session:"
                  - list [ref=e1049]:
                    - listitem [ref=e1050]: Did any commands fail unexpectedly?
                    - listitem [ref=e1051]: Did you take a wrong approach and have to backtrack?
                    - listitem [ref=e1052]: Did you discover a project-specific quirk (build order, env vars, timing, auth)?
                    - listitem [ref=e1053]: Did something take longer than expected because of a missing flag or config?
                  - paragraph [ref=e1054]: "If yes, log an operational learning for future sessions:"
                  - generic [ref=e1055]:
                    - generic [ref=e1056]:
                      - generic [ref=e1057]: bash
                      - button "Copy code" [ref=e1058]:
                        - img
                    - code [ref=e1062]:
                      - generic [ref=e1063]: "~/.claude/skills/gstack/bin/gstack-learnings-log '{\"skill\":\"SKILL_NAME\",\"type\":\"operational\",\"key\":\"SHORT_KEY\",\"insight\":\"DESCRIPTION\",\"confidence\":N,\"source\":\"observed\"}'"
                  - paragraph [ref=e1064]: "Replace SKILL_NAME with the current skill name. Only log genuine operational discoveries. Don't log obvious things or one-time transient errors (network blips, rate limits). A good test: would knowing this save 5+ minutes in a future session? If yes, log it."
                  - heading "Telemetry (run last)" [level=2] [ref=e1065]
                  - paragraph [ref=e1066]:
                    - text: After the skill workflow completes (success, error, or abort), log the telemetry event. Determine the skill name from the
                    - code [ref=e1067]: "name:"
                    - text: field in this file's YAML frontmatter. Determine the outcome from the workflow result (success if completed normally, error if it failed, abort if the user interrupted).
                  - paragraph [ref=e1068]:
                    - strong [ref=e1069]: "PLAN MODE EXCEPTION — ALWAYS RUN:"
                    - text: This command writes telemetry to
                    - code [ref=e1070]: ~/.gstack/analytics/
                    - text: (user config directory, not project files). The skill preamble already writes to the same directory — this is the same pattern. Skipping this command loses session duration and outcome data.
                  - paragraph [ref=e1071]: "Run this bash:"
                  - generic [ref=e1072]:
                    - generic [ref=e1073]:
                      - generic [ref=e1074]: bash
                      - button "Copy code" [ref=e1075]:
                        - img
                    - code [ref=e1079]:
                      - generic [ref=e1080]: _TEL_END=$(date +%s)
                      - generic [ref=e1081]: _TEL_DUR=$(( _TEL_END - _TEL_START ))
                      - generic [ref=e1082]: rm -f ~/.gstack/analytics/.pending-"$_SESSION_ID" 2>/dev/null || true
                      - generic [ref=e1083]: "# Session timeline: record skill completion (local-only, never sent anywhere)"
                      - generic [ref=e1084]: "~/.claude/skills/gstack/bin/gstack-timeline-log '{\"skill\":\"SKILL_NAME\",\"event\":\"completed\",\"branch\":\"'$(git branch --show-current 2>/dev/null || echo unknown)'\",\"outcome\":\"OUTCOME\",\"duration_s\":\"'\"$_TEL_DUR\"'\",\"session\":\"'\"$_SESSION_ID\"'\"}' 2>/dev/null || true"
                      - generic [ref=e1085]: "# Local analytics (gated on telemetry setting)"
                      - generic [ref=e1086]: if [ "$_TEL" != "off" ]; then
                      - generic [ref=e1087]: "echo '{\"skill\":\"SKILL_NAME\",\"duration_s\":\"'\"$_TEL_DUR\"'\",\"outcome\":\"OUTCOME\",\"browse\":\"USED_BROWSE\",\"session\":\"'\"$_SESSION_ID\"'\",\"ts\":\"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'\"}' >> ~/.gstack/analytics/skill-usage.jsonl 2>/dev/null || true"
                      - generic [ref=e1088]: fi
                      - generic [ref=e1089]: "# Remote telemetry (opt-in, requires binary)"
                      - generic [ref=e1090]: if [ "$_TEL" != "off" ] && [ -x ~/.claude/skills/gstack/bin/gstack-telemetry-log ]; then
                      - generic [ref=e1091]: ~/.claude/skills/gstack/bin/gstack-telemetry-log \
                      - generic [ref=e1092]: "--skill \"SKILL_NAME\" --duration \"$_TEL_DUR\" --outcome \"OUTCOME\" \\"
                      - generic [ref=e1093]: "--used-browse \"USED_BROWSE\" --session-id \"$_SESSION_ID\" 2>/dev/null &"
                      - generic [ref=e1094]: fi
                  - paragraph [ref=e1095]:
                    - text: Replace
                    - code [ref=e1096]: SKILL_NAME
                    - text: with the actual skill name from frontmatter,
                    - code [ref=e1097]: OUTCOME
                    - text: with success/error/abort, and
                    - code [ref=e1098]: USED_BROWSE
                    - text: with true/false based on whether
                    - code [ref=e1099]: $B
                    - text: was used. If you cannot determine the outcome, use "unknown". The local JSONL always logs. The remote binary only runs if telemetry is not off and the binary exists.
                  - heading "Plan Mode Safe Operations" [level=2] [ref=e1100]
