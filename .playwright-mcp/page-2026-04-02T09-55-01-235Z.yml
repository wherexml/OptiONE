                    - listitem [ref=e1265]: Contributor Mode
                    - listitem [ref=e1266]: Completion Status Protocol
                    - listitem [ref=e1267]: Telemetry (run last)
                    - listitem [ref=e1268]: "Step 0: Detect platform and base branch"
                    - listitem [ref=e1269]: Review Readiness Dashboard
                    - listitem [ref=e1270]: Plan File Review Report
                    - listitem [ref=e1271]: Prerequisite Skill Offer
                    - listitem [ref=e1272]: Plan Status Footer
                  - paragraph [ref=e1273]: Execute every other section at full depth. When the loaded skill's instructions are complete, continue with the next step below.
                  - paragraph [ref=e1274]: "After /office-hours completes, re-run the design doc check:"
                  - generic [ref=e1275]:
                    - generic [ref=e1276]:
                      - generic [ref=e1277]: bash
                      - button "Copy code" [ref=e1278]:
                        - img
                    - code [ref=e1282]:
