                      - generic [ref=e1284]: SLUG=$(~/.claude/skills/gstack/browse/bin/remote-slug 2>/dev/null || basename "$(git rev-parse --show-toplevel 2>/dev/null || pwd)")
                      - generic [ref=e1285]: BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null | tr '/' '-' || echo 'no-branch')
                      - generic [ref=e1286]: DESIGN=$(ls -t ~/.gstack/projects/$SLUG/*-$BRANCH-design-*.md 2>/dev/null | head -1)
                      - generic [ref=e1287]: "[ -z \"$DESIGN\" ] && DESIGN=$(ls -t ~/.gstack/projects/$SLUG/*-design-*.md 2>/dev/null | head -1)"
                      - generic [ref=e1288]: "[ -n \"$DESIGN\" ] && echo \"Design doc found: $DESIGN\" || echo \"No design doc found\""
                  - paragraph [ref=e1289]: If a design doc is now found, read it and continue the review. If none was produced (user may have cancelled), proceed with standard review.
                  - heading "/autoplan — Auto-Review Pipeline" [level=1] [ref=e1290]
                  - paragraph [ref=e1291]: One command. Rough plan in, fully reviewed plan out.
                  - paragraph [ref=e1292]: "/autoplan reads the full CEO, design, and eng review skill files from disk and follows them at full depth — same rigor, same sections, same methodology as running each skill manually. The only difference: intermediate AskUserQuestion calls are auto-decided using the 6 principles below. Taste decisions (where reasonable people could disagree) are surfaced at a final approval gate."
                  - separator [ref=e1293]
                  - heading "The 6 Decision Principles" [level=2] [ref=e1294]
                  - paragraph [ref=e1295]: "These rules auto-answer every intermediate question:"
                  - list [ref=e1296]:
                    - listitem [ref=e1297]:
                      - strong [ref=e1298]: Choose completeness
                      - text: — Ship the whole thing. Pick the approach that covers more edge cases.
                    - listitem [ref=e1299]:
                      - strong [ref=e1300]: Boil lakes
                      - text: — Fix everything in the blast radius (files modified by this plan + direct importers). Auto-approve expansions that are in blast radius AND < 1 day CC effort (< 5 files, no new infra).
                    - listitem [ref=e1301]:
                      - strong [ref=e1302]: Pragmatic
                      - text: — If two options fix the same thing, pick the cleaner one. 5 seconds choosing, not 5 minutes.
                    - listitem [ref=e1303]:
                      - strong [ref=e1304]: DRY
                      - text: — Duplicates existing functionality? Reject. Reuse what exists.
                    - listitem [ref=e1305]:
                      - strong [ref=e1306]: Explicit over clever
                      - text: — 10-line obvious fix > 200-line abstraction. Pick what a new contributor reads in 30 seconds.
                    - listitem [ref=e1307]:
                      - strong [ref=e1308]: Bias toward action
                      - text: — Merge > review cycles > stale deliberation. Flag concerns but don't block.
                  - paragraph [ref=e1309]:
                    - strong [ref=e1310]: "Conflict resolution (context-dependent tiebreakers):"
                  - list [ref=e1311]:
                    - listitem [ref=e1312]:
                      - strong [ref=e1313]: "CEO phase:"
                      - text: P1 (completeness) + P2 (boil lakes) dominate.
                    - listitem [ref=e1314]:
                      - strong [ref=e1315]: "Eng phase:"
                      - text: P5 (explicit) + P3 (pragmatic) dominate.
                    - listitem [ref=e1316]:
                      - strong [ref=e1317]: "Design phase:"
                      - text: P5 (explicit) + P1 (completeness) dominate.
                  - separator [ref=e1318]
                  - heading "Decision Classification" [level=2] [ref=e1319]
                  - paragraph [ref=e1320]: "Every auto-decision is classified:"
                  - paragraph [ref=e1321]:
                    - strong [ref=e1322]: Mechanical
                    - text: "— one clearly right answer. Auto-decide silently. Examples: run codex (always yes), run evals (always yes), reduce scope on a complete plan (always no)."
                  - paragraph [ref=e1323]:
                    - strong [ref=e1324]: Taste
                    - text: "— reasonable people could disagree. Auto-decide with recommendation, but surface at the final gate. Three natural sources:"
