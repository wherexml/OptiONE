                    - listitem [ref=e1191]:
                      - text: If the URL contains "gitlab" → platform is
                      - strong [ref=e1192]: GitLab
                    - listitem [ref=e1193]:
                      - text: "Otherwise, check CLI availability:"
                      - list [ref=e1194]:
                        - listitem [ref=e1195]:
